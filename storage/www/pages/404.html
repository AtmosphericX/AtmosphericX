<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AtmosphericX - 404</title>
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/404.css">

        <!-- Apple Stuff-->
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
    </head>
    <body>
        <div class="graph-bg" style="z-index: -1;"></div>
        <div class="container">
            <img class="error-image" src="/assets/images/404-not-found.gif" alt="Lizard pressing random buttons">
            <h1 class="error-title">404 - Page Not Found</h1>
            <p class="error-message">
                The page you are looking for does not exist or has been moved. Please check the URL or return to the <a class="error-link" href="/">dashboard</a>.
            </p>
        </div>
    </body>
</html>
