<h1 id="welcome-title" class="title text-primary text-neutral">Welcome to AtmosphericX</h1>
<div class="grid span-4">
    <div class="stat-card span-3">
        <div class="stat-left">
            <div class="stat-title">Active Warnings</div>
            <div id="total-warnings" class="stat-value">0</div>
        </div>
    </div>
    <div class="stat-card span-3">
        <div class="stat-left">
            <div class="stat-title">Active Watches</div>
            <div id="total-watches" class="stat-value">0</div>
        </div>
    </div>
    <div class="stat-card span-3">
        <div class="stat-left">
            <div class="stat-title">Active Statements</div>
            <div id="total-statements" class="stat-value">0</div>
        </div>
    </div>
    <div class="stat-card span-3">
        <div class="stat-left">
            <div class="stat-title">Active Advisories</div>
            <div id="total-advisories" class="stat-value">0</div>
        </div>
    </div>
