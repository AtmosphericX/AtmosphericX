<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AtmosphericX - Setup</title>
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css"> <!-- Global Theme CSS -->
        <link rel="stylesheet" href="/assets/styles/notification.css"> <!-- Notification CSS-->
        <link rel="stylesheet" href="/assets/styles/portal.css"> <!-- Page CSS -->
        <!-- JS -->
        <script src="/assets/js/classes/utils.js"></script> <!-- Utility Functions -->
        <script src="/assets/js/scripts/setup.js"></script> <!-- Page Logic -->

        <!-- Apple Stuff-->
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
    </head>
    <body>

        <div class="notifications"></div>
        <div class="background"></div>

        <!-- Authentication Container -->
        <div class="container" id="setup" style="display: block;">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="input-label">Authentication Code</label>
                    <input type="username" class="input-field" placeholder="1234"/>
                </div>
                <button class="action" type="submit">Setup Now</button>
                <small>Authentication code can be seen in the server console. Regenerate by refreshing this page.</small>
            </form>
            <div class="extra">
                <a href="/documentation" target="_blank">Documentation</a>
            </div>
            <p class="version">AtmosphericX <span id="version-value"></span></p>
        </div>

        <!-- Account Creation Container -->
        <div class="container" id="creation" style="display: none;">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="username" class="input-field" placeholder="Admin"/>
                </div>
                 <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" class="input-field" placeholder="••••••••••••••••" required/>
                </div>
                <div class="input-group">
                    <label class="input-label">Confirm Password</label>
                    <input type="password" class="input-field" placeholder="••••••••••••••••" required/>
                </div>
                <button class="action" type="submit">Create Admin Account</button>
            </form>
            <div class="extra">
                <a href="/documentation" target="_blank">Documentation</a>
            </div>
            <p class="version">AtmosphericX <span id="version-value"></span></p>
        </div>

        
        <footer>
            <div class="footer-links">
                <a href="https://atmosphericx-discord.scriptktity.cafe" target="_blank">Discord</a>
                <a href="https://ko-fi.com/k3yomi" target="_blank">Ko-Fi</a>
                <a href="/documentation" target="_blank">Documentation</a>
            </div>
            <p>&copy; 2026 Project AtmosphericX. All rights reserved.</p>
        </footer>
    </body>
</html>
