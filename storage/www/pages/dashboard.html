<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AtmosphericX - Dashboard</title>
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/404.css">

        <!-- Apple Stuff-->
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
    </head>
    <body>
        <div class="graph-bg" style="z-index: -1;"></div>
        <div class="container">
            <img class="error-image" src="/assets/images/404-not-found.gif" alt="Lizard pressing random buttons">
            <h1 class="error-title">Dashboard Unavailable</h1>
            <p class="error-message">
                The dashboard is currently unavailable. Please try again later.
                <form method="POST" action="/api/portal/logout" style="display: inline;">
                    <button type="submit" style="background: none; border: none; color: inherit; cursor: pointer; text-decoration: underline; padding: 0;">GO BACK</button>
                </form>
                <script>
                    document.querySelector('form').addEventListener('submit', function(e) {
                        e.preventDefault();
                        fetch('/api/portal/logout', { method: 'POST' })
                            .then(() => location.reload());
                    });
                </script>
            </p>
        </div>
    </body>
</html>
