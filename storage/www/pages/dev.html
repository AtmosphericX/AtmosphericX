<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AtmosphericX - Dashboard</title>
        <link rel="icon" href="/assets/images/favicon.ico" />

        <!-- Styles -->
        <link rel="stylesheet" href="/assets/styles/global.css" />
        <link rel="stylesheet" href="/assets/styles/notification.css"/>
        <link rel="stylesheet" href="/assets/styles/app.css" />
        <link rel="stylesheet" href="/assets/styles/dashboard.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

        <!-- Scripts -->
        <script src="/assets/js/static/layout.js"></script>
        <script src="/assets/js/static/strings.js"></script>
        <script src="/assets/js/classes/utils.js"></script>
        <script src="/assets/js/classes/dashboard.js"></script>

        <!-- Apple / PWA -->
        <link rel="manifest" href="/assets/static/manifest.json" />
        <link rel="apple-touch-icon" href="/assets/images/manifest.png" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    </head>

    <body>
        <div class="graph-bg"></div>
        <div class="notifications"></div>
        <div class="announcement" id="announcement">
            <p class="message text-primary text-neutral" id="message"></p>
        </div>

        <aside class="sidebar">
            <img class="logo" src="/assets/images/logo.png" alt="AtmosphericX" />
            <small class="version text-primary text-neutral" id="sidebar-version"></small>
            
            <div class="nav">
                <a href="#home" class="nav-link text-neutral hover-light" onclick="dashboard.onUpdate()">Home</a>
                <div class="nav-dropdown active">
                    <div class="nav-dropdown-header text-neutral hover-light">Settings <i class="fas fa-chevron-down"></i></div>
                    <div class="nav-dropdown-content">
                        <a href="#profile" class="nav-link text-neutral hover-light" onclick="dashboard.onUpdate()">Profile</a>
                        <a href="#account" class="nav-link text-neutral hover-light">Account</a>
                        <a href="#appearance" class="nav-link text-neutral hover-light">Appearance</a>
                        <a href="#notifications" class="nav-link text-neutral hover-light">Notifications</a>
                    </div>
                </div>
            </div>
         
            
            <small class="footer text-primary text-neutral" id="sidebar-footer">Project AtmosphericX</small>
        </aside>

        <main class="container" id="container">
            <h1 class="title text-primary text-neutral">Page Title Here</h1>
            <div class="container-grid">
                <div class="grid span-4">
                    <div class="card span-4 row-1">
                        <div class="card-header">
                            <div class="card-title text-neutral">Card Title Example</div>
                            <div class="card-icon">T</div>
                        </div>       
                    </div>
                </div>
            </div>
        </main>
    </body>
    <script>
        const utils = new Utils();
        const dashboard = new Dashboard(utils);
    </script>
</html>
