<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AtmosphericX - Portal</title>
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css"> <!-- Global Theme CSS -->
        <link rel="stylesheet" href="/assets/styles/notification.css"> <!-- Notification CSS-->
        <link rel="stylesheet" href="/assets/styles/portal.css"> <!-- Page CSS -->
        <!-- JS -->
        <script src="/assets/js/classes/utils.js"></script> <!-- Utility Functions -->
        <script src="/assets/js/scripts/portal.js"></script> <!-- Page Logic -->

        <!-- Apple Stuff-->
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
    </head>
    <body>
        <div class="notifications"></div>
        <div class="background"></div>
        <!-- Announcement Container -->
        <div class="header-announcement" id="header-announcement">
            <p class="header-message"></p>
        </div>

        <!-- Login Container -->
        <div class="container" id="login" style="display: block;">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="username" class="input-field" placeholder="root"/>
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" class="input-field" placeholder="••••••••••••••••"/>
                </div>
                <button class="action" type="submit">Login</button>
                <button class="passive" type="submit" hidden aria-hidden="true">Logon as Guest</button>
            </form>
            <div class="extra">
                <a href="/documentation" target="_blank">Documentation</a>
                <a href="#signup">Sign Up</a>
                <a href="#reset">Reset Password</a>
            </div>
            <p class="version">AtmosphericX <span id="version-value"></span></p>
        </div>

        <!-- Sign up Container -->
        <div class="container" id="signup">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="username" class="input-field" placeholder="root" required/>
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" class="input-field" placeholder="••••••••••••••••" required/>
                </div>
                <div class="input-group">
                    <label class="input-label">Confirm Password</label>
                    <input type="password" class="input-field" placeholder="••••••••••••••••" required/>
                </div>
                <button class="action" type="submit">Create Account</button>
            </form>
            <div class="extra">
                <a href="/documentation" target="_blank">Documentation</a>
                <a href="#login">Sign in</a>
                <a href="#reset">Reset Password</a>
            </div>
            <p class="version">AtmosphericX <span id="version-value"></span></p>
        </div>

        <!-- Reset Password Container -->
        <div class="container" id="reset">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="username" class="input-field" placeholder="root" required/>
                </div>
                <div class="input-group">
                    <label class="input-label">Current Password</label>
                    <input type="password" class="input-field" placeholder="••••••••••••••••" required/>
                </div>
                <div class="input-group">
                    <label class="input-label">New Password </label>
                    <input type="password" class="input-field" placeholder="••••••••••••••••" required/>
                </div>
                <button class="action" type="submit">Reset Password</button>
            </form>
            <div class="extra">
                <a href="#login">Sign in</a>
                <a href="/documentation" target="_blank">Documentation</a>
                <a href="#signup">Sign up</a>
            </div>
            <p class="version">AtmosphericX <span id="version-value"></span></p>
        </div>

        
        <footer>    
            <div class="footer-links">
                <a href="https://atmosphericx-discord.scriptkitty.cafe" target="_blank" rel="noopener noreferrer">Discord</a>
                <a href="https://ko-fi.com/k3yomi" target="_blank" rel="noopener noreferrer">Ko-Fi</a>
                <a href="/documentation" target="_blank" rel="noopener noreferrer">Documentation</a>
            </div>
            <p class="footer-cc">&copy; 2026 Project AtmosphericX. All rights reserved.</p>
        </footer>
    </body>
</html>
