<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Metadata -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
        <meta name="description" content="AtmosphericX is a modern, modular weather dashboard and widget platform built for live streaming, storm chasing, meteorologists, first responders, and weather-aware individuals.">
        <meta property="og:description" content="AtmosphericX is a modern, modular weather dashboard and widget platform built for live streaming, storm chasing, meteorologists, first responders, and weather-aware individuals.">
        <meta name="twitter:description" content="AtmosphericX is a modern, modular weather dashboard and widget platform built for live streaming, storm chasing, meteorologists, first responders, and weather-aware individuals.">
        <meta property="og:image" content="/assets/images/manifest.png">
        <meta name="twitter:image" content="/assets/images/manifest.png">
        <meta name="twitter:title" content="AtmosphericX v8">
        <meta property="og:title" content="AtmosphericX v8">
        <meta property="og:url" content="/">
        <meta property="og:type" content="website">
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <title>AtmosphericX - Portal</title>

        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/app.css">
        <link rel="stylesheet" href="/assets/styles/notification.css">
        <link rel="stylesheet" href="/assets/styles/portal.css">
        
        <!-- JS -->
        <script src="/assets/js/classes/utils.js" defer></script>
        <script src="/assets/js/scripts/portal.js" defer></script>
    </head>
    <body>
        <div class="notifications"></div>
        <div class="background"></div>
        <!-- Announcement Container -->
        <div class="header-announcement" id="header-announcement">
            <p class="text-primary text-neutral header-message"></p>
        </div>

        <!-- Login Container -->
        <div class="div-primary container" id="login" style="display: block;">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="label text-neutral">Username</label>
                    <input type="username" class="input-primary hover radius-10 " placeholder="root"/>
                </div>
                <div class="input-group">
                    <label class="label text-neutral">Password</label>
                    <input type="password" class="input-primary hover radius-10" placeholder="••••••••••••••••"/>
                </div>
                <button class="btn-primary hover bg-success" type="submit">Login</button>
                <button class="btn-primary hover" id="btn-guest" type="submit" hidden aria-hidden="true">Logon as Guest</button>
            </form>
            <div class="extra">
                <a class='a-primary hover-light text-neutral' href="/documentation" target="_blank">Documentation</a>
                <a class='a-primary hover-light text-neutral' href="#signup">Sign Up</a>
                <a class='a-primary hover-light text-neutral' href="#reset">Reset Password</a>
            </div>
            <p class="text-primary text-neutral version"><span id="version-value"></span></p>
        </div>


        <!-- Sign up Container -->
        <div class="div-primary container" id="signup">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="label text-neutral">Username</label>
                    <input type="username" class="input-primary hover radius-10" placeholder="root" required/>
                </div>
                <div class="input-group">
                    <label class="label text-neutral">Password</label>
                    <input type="password" class="input-primary hover radius-10" placeholder="••••••••••••••••" required/>
                </div>
                <div class="input-group">
                    <label class="label text-neutral">Confirm Password</label>
                    <input type="password" class="input-primary hover radius-10" placeholder="••••••••••••••••" required/>
                </div>
                <button class="btn-primary hover bg-info" type="submit">Create Account</button>
            </form>
            <div class="extra">
                <a class='a-primary hover-light text-neutral' href="/documentation" target="_blank">Documentation</a>
                <a class='a-primary hover-light text-neutral' href="#login">Sign in</a>
                <a class='a-primary hover-light text-neutral' href="#reset">Reset Password</a>
            </div>
            <p class="text-primary text-neutral version"><span id="version-value"></span></p>
        </div>

        <!-- Reset Password Container -->
        <div class="div-primary container" id="reset">
            <img src="/assets/images/logo.png" alt="AtmosphericX v8.0.0 Logo" class="logo">
            <form>
                <div class="input-group">
                    <label class="label text-neutral">Username</label>
                    <input type="username" class="input-primary hover radius-10" placeholder="root" required/>
                </div>
                <div class="input-group">
                    <label class="label text-neutral">Current Password</label>
                    <input type="password" class="input-primary hover radius-10" placeholder="••••••••••••••••" required/>
                </div>
                <div class="input-group">
                    <label class="label text-neutral">New Password</label>
                    <input type="password" class="input-primary hover radius-10" placeholder="••••••••••••••••" required/>
                </div>
                <button class="btn-primary hover bg-danger" type="submit">Reset Password</button>
            </form>
            <div class="extra">
                <a class='a-primary hover-light text-neutral' href="#login">Sign in</a>
                <a class='a-primary hover-light text-neutral' href="/documentation" target="_blank">Documentation</a>
                <a class='a-primary hover-light text-neutral' href="#signup">Sign up</a>
            </div>
            <p class="text-primary text-neutral version"><span id="version-value"></span></p>
        </div>

        
        <footer>    
            <p class="footer-cc">&copy; 2026 Project AtmosphericX. All rights reserved.</p>
            <div class="footer-links">
                <a class="a-primary hover-light text-neutral" href="https://atmosphericx-discord.scriptkitty.cafe" target="_blank" rel="noopener noreferrer">Discord</a>
                <a class="a-primary hover-light text-neutral" href="https://ko-fi.com/k3yomi" target="_blank" rel="noopener noreferrer">Ko-Fi</a>
                <a class="a-primary hover-light text-neutral" href="/documentation" target="_blank" rel="noopener noreferrer">Documentation</a>
            </div>
        </footer>
    </body>
</html>
