<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width initial-scale=0.5, maximum-scale=0.5, user-scalable=no minimal-ui">
    <title>AtmosphericX - Watchdog Widget (By: KiyoWx)</title>
    <link rel="icon" href="/src/__assets/__images/__logos/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/src/__assets/__styles/global.css">
    <script src="/src/__assets/__scripts/utils.js"></script>
    <script src="/src/__assets/__scripts/handler.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        .field_input { overflow: hidden; text-align: center; padding: 0px 5px 0 5px; color: var(--watchdog-widget-color); font-size: var(--watchdog-widget-font-size); text-shadow: var(--watchdog-widget-text-shadow) }
    </style>
</head>
<body><div class="field_input" id="field_input"></div></body>
<script>
    /**
     * @widget watchdog
     * @description
     *      Watches and displays total number of active events from the server (Specifically specified event types).
     * 
     * @param {string} events - Comma-separated list of event types to monitor (e.g., Tornado Warning, Resedential Fire, etc.).
     */
    const utils = new Utils();
    utils.websocket([`events`, `manual`, `emergencies`, `storm_reports`, `configurations`]).then(() => {
        const handler = new Handler(utils); // Initialize handler with utils
        const fieldInput = document.getElementById("field_input");
        const parameters = new URLSearchParams(window.location.search);
        const eventTypes = parameters.get("events") ? parameters.get("events").split(",") : [];
        document.addEventListener("eventCacheUpdated", async () => {
            const events = await handler.syncEvents();
            handler.syncQueue(2);
            const whitelistedEvents = events.filter(event => 
                eventTypes.some(type => type.trim().toLowerCase() === event.feature.event.properties.event.toLowerCase())
            );
            fieldInput.textContent = `${eventTypes}(s): ${whitelistedEvents.length}`;
        });
    });
</script>
</html>
