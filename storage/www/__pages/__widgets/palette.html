<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width initial-scale=0.5, maximum-scale=0.5, user-scalable=no minimal-ui">
    <title>AtmosphericX - Palettes Widget (By: KiyoWx)</title>
    <link rel="icon" href="/src/__assets/__images/__logos/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/src/__assets/__styles/global.css">
    <script src="/src/__assets/__scripts/utils.js"></script>
    <script src="/src/__assets/__scripts/wise.js"></script>
    <script src="/src/__assets/__scripts/widgets.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        .field_box { 
            width: 100vw; 
            background: var(--clr-info-a10);
            height: 100vh; 
            display: block;
            transition: background 1.5s ease;
        }
    </style>
</head>
<body>
    <div class="field_box" id='field_box'></div>
</body>
<script>
    const parameters = new URLSearchParams(window.location.search);
    const options = { type: parameters.get("type") ?? `primary` }
    const utils = new Utils();
    const widgets = new Widgets(utils, options);
    utils.websocket([`configurations`, `events`, `emergencies`]).then(() => {
        document.addEventListener("eventCacheUpdated", async () => {
            const box = document.getElementById('field_box');
            const getTheme = widgets.getCurrentTheme();
            box.style.background = (options.type === `primary`) ? getTheme.primary : getTheme.secondary;
        });
    });
</script>
</html>
