<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtmosphericX - Slideshow  Widget (By: KiyoWx)</title>
    <link rel="icon" href="/src/__assets/__images/__logos/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/src/__assets/__styles/global.css">
    <script src="/src/__assets/__scripts/utils.js"></script>
    <script src="/src/__assets/__scripts/handler.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        .field_body { display: block; width: 100vw; height: 100vh; }
        .field_input { font-size: var(--slideshow-widget-font-size); font-weight: var(--slideshow-widget-font-weight); color: var(--slideshow-widget-color); text-shadow: var(--slideshow-widget-text-shadow); background-color: var(--slideshow-widget-background); padding: var(--slideshow-widget-padding); top: var(--slideshow-widget-top); right: var(--slideshow-widget-right); position: fixed; }
    </style>
</head>
<body>
    <img class="field_body" id="field_body"></img>
    <div class="field_input" id="field_input"></div>
</body>
<script>
    /**
     * @widget slideshow
     * @description
     *      Displays images from SPC outlooks and other sources based on day selection, cycling through them at set intervals.
     * 
     * @param {string} day - The day to display (e.g., "1", "2", ..., "8"). Default is "0" for all days. (looped)
     * @param {number} wait - Time in seconds each image is displayed before switching to the next. Default is 10 seconds.
     */
    const utils = new Utils();
    utils.websocket([`configurations`]).then(() => {
        const fieldInput = document.getElementById("field_input");
        const fieldBody = document.getElementById("field_body");
        const parameters = new URLSearchParams(window.location.search);
        const dayTypes = parameters.get("day").split(",").map(d => {
            const n = parseInt(d, 10); return (n >= 0 && n <= 8) ? n : 0;}) ?? [0];
        const waitTime = parseInt(parameters.get("wait")) ?? 10;
        document.addEventListener("eventCacheUpdated", async () => {
            utils.initializeStorage(`slideshow_index`, 0);
            utils.initializeStorage(`slideshow_slide_index`, 0);
            utils.storage.slideshow_index = (utils.storage.slideshow_index + 1) % dayTypes.length;
            const cfg = utils.storage.configurations;
            const slideshow = [...cfg.slideshow].sort((a, b) => 
                a.day - b.day || a.title.localeCompare(b.title)
            );
            const currentDay = parseInt(dayTypes[utils.storage.slideshow_index], 10);
            const filtered = currentDay === 0
                ? slideshow : slideshow.filter(o => o.day === currentDay);
            function showSlide(idx) {
                if (filtered.length === 0) {
                    fieldBody.innerHTML = "<div style='text-align:center;'>No images available.</div>";
                    fieldInput.textContent = "";
                    return;
                }
                const o = filtered[idx];
                fieldBody.src = `${o.source}`;
                fieldInput.textContent = `${o.title}`;
            }
            showSlide(utils.storage.slideshow_slide_index);
            if (window.spcSlideshowInterval) clearInterval(window.spcSlideshowInterval);
            window.spcSlideshowInterval = setInterval(() => {
                utils.storage.slideshow_slide_index = (utils.storage.slideshow_slide_index + 1) % filtered.length;
                showSlide(utils.storage.slideshow_slide_index);
            }, waitTime * 1_000);
        });
    });
</script>
</html>
