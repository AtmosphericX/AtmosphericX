<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AtmosphericX - Widgets</title>
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/notification.css">
        <!-- JS --> 
        <script src="/assets/js/classes/utils.js"></script> <!-- Utility Functions -->
        <script src="/assets/js/classes/wise.js"></script> <!-- WeatherWise Logic -->
        <script src="/assets/js/classes/widgets.js"></script> <!-- Widgets Logic -->
        <script src="/assets/js/static/widgetFetch.js"></script> <!-- URL WidgetFetch Logic -->

        <!-- Apple Stuff-->
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
    </head>
    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        :root { 
            --widget-font-size: 5vw;
            --widget-subtext-font-size: 3vw;
            --widget-color: var(--clr-light-a0);
            --widget-subtext-color: var(--clr-light-a0);
            --widget-text-shadow: 0 0 18px var(--clr-dark-a0);
            --widget-padding: 25px;
        }
        body { 
            overflow: hidden; 
        }
        .widget-container { 
            position: absolute;
            height: 100%;
            bottom: 0; 
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        .widget-child-1 {
            padding: var(--widget-padding);
            font-size: var(--widget-font-size);
            color: var(--widget-color);
            text-shadow: var(--widget-text-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            width: 100%;
            height: 1.4em;
        }
        .widget-child-2 {
            font-size: var(--widget-subtext-font-size);
            color: var(--widget-subtext-color);
            text-shadow: var(--widget-text-shadow);
            position: static;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
    </style>
    <body> 
        <div class="notifications"></div>
        <div class="widget-container" id="widget-container">
            <div class="widget-child-1" id="widget-child-1"></div>
            <div class="widget-child-2" id="widget-child-2"></div>
        </div>
    </body>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let cache = {
                hashes: [],
                running: false
            };
            const settings = {global: aGlobalElementSettings};
            const utils = new Utils();
            const wise = new Wise(utils);
            const widgets = new Widgets(utils);
            
            settings.setElement = get(aSearch, `setSelectedElement`) ?? document.getElementById('widget-container')
            settings.setElementTitle = get(aSearch, `setElementTitle`) ??  document.getElementById('widget-child-1');
            settings.setElementSubtitle = get(aSearch, `setElementSubtitle`) ??  document.getElementById('widget-child-2');
            settings.setDirectory = get(aSearch, `setDirectory`) ??  `%properties.event%`
            settings.setDirectorySecondary = get(aSearch, `setDirectorySecondary`) ??  `Issued at %properties.issued%`
            settings.setSfx = get(aSearch, `setSfx`) ??  `/sfx/dash_sfx/boom3.mp3`;
            settings.setAwaitPeriod = get(aSearch, `setAwaitPeriod`) ?? 30;
            settings.setSearch = get(aSearch, `setSearch`) ?? null;
            settings.global.setAnimationStartDuration = get(aSearch, `setAnimationStartDuration`) ?? 3;
            settings.global.setAnimationEndDuration = get(aSearch, `setAnimationEndDuration`) ?? 3;
            settings.global.setAnimationHasEnding = get(aSearch, `setAnimationHasEnding`) ?? true;
            settings.global.setAnimatedDelayEnding = get(aSearch, `setAnimatedDelayEnding`) ?? 5;
            settings.global.setElementThemed = false; // Never enabled, no point in having a background for this;
    

            utils.socket([`configurations`, `events`]).then(() => {
                document.addEventListener('onUpdate', (event) => {
                    widgets.applyGlobalSettings(settings.setElement, settings);  
                    cb()
                })
            })

            function cb() { 
                const getEvents = utils.storage?.events?.features ?? [];
                getEvents.filter(async (event) => {
                    const getHash = event?.properties?.hash;
                    const getQuery = event?.properties?.spotters?.find(tracker => tracker.name?.toLowerCase().includes(String(settings.setSearch)?.toLowerCase()));
                    const getTracker = getQuery ?? event?.properties?.spotters?.[0];
                    const getEventName = event?.properties?.event;
                    if (!getTracker) { return false }
                    if (cache.hashes.includes(getHash)) { return false }
                    if (getTracker.metadata.inside && !cache.running) {
                        cache.running = true;
                        cache.hashes.push(getHash);
                        const getTheme = utils.getEventColor(getEventName)
                        const getOutputTitle = utils.getTextFromDirectory(event, settings.setDirectory);
                        const getOutputSubtitle = utils.getTextFromDirectory(event, settings.setDirectorySecondary);
                        utils.setString(settings.setElementTitle, getOutputTitle, settings)
                        utils.setString(settings.setElementSubtitle, getOutputSubtitle, settings, true)
                        utils.sound(settings.setSfx)
                        settings.setElement.style.display = `block`
                        await utils.sleep(settings.setAwaitPeriod * 1000);
                            settings.setElementSubtitle.textContent = ``;
                            settings.setElementTitle.textContent = ``;
                            settings.setElement.style.display = `none`
                            cache.running = false;
                    }
                })
            }
        })
    </script>
</html>
