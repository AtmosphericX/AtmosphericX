<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AtmosphericX - Widgets</title>
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/notification.css">
        <!-- JS --> 
        <script src="/assets/js/classes/utils.js" defer></script> <!-- Utility Functions -->
        <script src="/assets/js/classes/wise.js" defer></script> <!-- WeatherWise Logic -->
        <script src="/assets/js/classes/widgets.js" defer></script> <!-- Widgets Logic -->
        <script src="/assets/js/static/parameters.js" defer></script> <!-- URL parameters Logic -->

        <!-- Apple / PWA -->
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
    </head>
    <style>
        :root {
            --widget-font-size: 50px;
            --widget-color: var(--clr-light-a0);
            --widget-text-shadow: 0 0 8px var(--clr-dark-a0);
            --widget-top: 0px;
            --widget-right: 0px;
        }
        body { 
            overflow: hidden; 
        }
        .widget {
            display: block;
            width: 100%;
            max-width: 100%;
            color: var(--widget-color);
            font-size: var(--widget-font-size);
            text-shadow: var(--widget-text-shadow);
            height: auto;
            overflow-wrap: normal;
            text-align: center;
            word-break: normal;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
    <body> 
        <div class="notifications"></div>
        <div class="widget-container" id="widget-container">
            <span class="widget" id="widget"></span>
        </div>
    </body>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let cache = {};
            const settings = {global: aGlobalElementSettings};
            const utils = new Utils();
            const wise = new Wise(utils);
            const widgets = new Widgets(utils);
            
            settings.setElement = document.getElementById('widget');
            settings.setType = get(aSearch, `setType`) ?? null;
            settings.setTextWrapping = get(aSearch, `setTextWrapping`) ?? false;

            settings.global.setAnimationStartDuration = get(aSearch, `setAnimationStartDuration`) ?? 2;
            settings.global.setAnimationEndDuration = get(aSearch, `setAnimationEndDuration`) ?? 2;

            const subscriptionServices = { 
                text: [`/`, `configurations`],
                getRandomEvent: [`random_event`, `configurations`], getClock: [`/`, `configurations`], getWatchdog: [`events`, `configurations`],
                getRandomPulsePoint: [`random_pulsepoint`, `configurations`],
                getTracking: [`tracking`, `configurations`], getOutages: [`outages`, `configurations`],
                getNearbySpotters: [`spotters`, `tracking`, `configurations`], getNearbyEvents: [`events`, `tracking`, `configurations`],
                getDbzIntensity: [`tracking`, `configurations`], getMesonet: [`mesonet`, `configurations`],
            }

            if (settings.setType == null) { 
                return utils.notify({
                    type: "error",
                    title: "Widget Error",
                    message: `No widget type specified, please consult to the documentation for widget types.`,
                    duration: 15e3
                })
            }
            if (subscriptionServices[settings.setType] == null) { 
                return utils.notify({
                    type: "error",
                    title: "Widget Error",
                    message: `Invalid widget type specified, please consult to the documentation for widget types.`,
                    duration: 15e3
                })
            }
            if (settings?.global?.setElementThemed) {
                subscriptionServices[settings.setType].push(`events`)
                subscriptionServices[settings.setType].push(`pulsepoint`)
            }

            if (settings.setTextWrapping) {
                settings.setElement.style.overflowWrap = 'break-word';
                settings.setElement.style.wordBreak = 'break-word';
                settings.setElement.style.whiteSpace = 'normal';
            }

            utils.socket(subscriptionServices[settings.setType]).then(() => {
                document.addEventListener('onUpdate', (event) => {
                    switch (settings.setType) {
                        case `getClock`: cb(`cb.time`); break;
                        case `getMesonet`: cb(`cb.string`, utils?.storage?.mesonet?.features?.[0]); break;
                        case `getRandomEvent`: cb(`cb.string`, utils?.storage?.random_event?.features?.[0]); break;
                        case `getRandomPulsePoint`: cb(`cb.string`, utils?.storage?.random_pulsepoint?.features?.[0]); break;
                        case `getOutages`: cb(`cb.string`, utils?.storage?.outages); break;
                        case `getTracking`: cb(`cb.string`, utils?.storage?.tracking?.features?.[0]); break;
                        default: cb(`cb.special`); break;
                    }
                    widgets.applyGlobalSettings(settings.setElement, settings);  
                })
            })

            function cb(assignmentType, assignmentData) { 
                if (assignmentType == `cb.string`) { 
                    const getOutput = utils.getTextFromDirectory(assignmentData, settings.global.setValuePath)
                    utils.setString(settings.setElement, getOutput ?? settings?.global?.setTextPlaceholder ?? `---`, settings);
                }
                if (assignmentType == `cb.time`) { 
                    const getParameters = { time: { time: true }, date: { date: true }, timezone: { timezone: true }, };
                    const getFormat = get(aSearch, `setFormat`) ?? `time`;
                    const getTimezone = get(aSearch, `setTimezone`) ?? null;
                    const getMilitaryTime = get(aSearch, `setMilitaryTime`) ?? null;
                    const getRefreshTime = get(aSearch, `setRefreshTime`) ?? 1;
                    if (cache.loop) { return }
                    utils.setString(settings.setElement, utils.getTimeMetadata({
                        return: getParameters[getFormat],
                        timezone: getTimezone,
                        military: getMilitaryTime,
                    }), settings);
                    cache.loop = setInterval(() => {
                        utils.setString(settings.setElement, utils.getTimeMetadata({
                            return: getParameters[getFormat],
                            timezone: getTimezone,
                            military: getMilitaryTime,
                        }), settings);
                    }, getRefreshTime * 1000);
                }
                if (assignmentType == `cb.special`) { 
                    switch (settings.setType) {
                        case `getWatchdog`: {
                            let count = 0;
                            const getWatchdogList = (get(aSearch, `setWatchdogList`) ?? [`* Warning`]).map(e => e.trim().toLowerCase())
                            const getFeatures = utils.storage?.events?.features ?? [];
                            const getMatches = getWatchdogList.filter(e => !e.startsWith("*"));
                            const getWildcards = getWatchdogList.filter(e => e.startsWith("*")).map(e => e.slice(1));
                            for (const feature of getFeatures) {
                                const getEventName = feature.properties.event.toLowerCase();
                                if (getMatches.includes(getEventName)) { count++; } else {
                                    for (const wc of getWildcards) {
                                        if (wc && getEventName.includes(wc)) { count++; break; }
                                    }
                                }
                            }
                            const getFiltered = getWatchdogList.map(e => e.replace(/\*/g, '')).map(ev => {
                                const getLoweredEvent = ev.trim().toLowerCase();
                                if (getLoweredEvent === "advisory") return "Advisories";
                                if (getLoweredEvent === "watch") return "Watches";
                                if (getLoweredEvent === "warning") return "Warnings";
                                if (getLoweredEvent === "statement") return "Statements";
                                return ev.trim().toUpperCase();
                            })
                            return utils.setString(settings.setElement, `${getFiltered.join(", ")}: ${count}`, settings);
                        }
                        case `getNearbySpotters`: {
                            const getSearch = get(aSearch, `setSearch`) ?? null;
                            const getRadius = get(aSearch, `setRadius`) ?? 50;
                            const getQuery = utils.storage?.tracking?.features.find(tracker => tracker.properties?.name?.toLowerCase().includes(String(getSearch)?.toLowerCase()));
                            const getTracker = getQuery ?? utils.storage?.tracking?.features[0];
                            if (!getTracker) { 
                                return utils.setString(settings.setElement, settings?.global?.setTextPlaceholder ?? `No Trackers Found`, settings);
                            }
                            const getSpotters = utils.storage?.spotters?.features ?? [];
                            const getNearby = getSpotters.filter(spotter => {
                                const [lon, lat] = spotter.geometry.coordinates;
                                return utils.getDistance( {lat, lon}, {lat: getTracker.geometry.coordinates[1], lon: getTracker.geometry.coordinates[0]}) < getRadius ?? 5;
                            });
                            cache.getNearbySpotters = (getNearby.length > 1) ? getNearby.length - 1 : 0;
                            return utils.setString(settings.setElement, cache.getNearbySpotters, settings);
                        }
                        case `getNearbyEvents`: {
                            const getSearch = get(aSearch, `setSearch`) ?? null;
                            const getRadius = get(aSearch, `setRadius`) ?? 50;
                            let getEvent, getMin = Infinity, getUnit, getMax = getRadius;
                            for (const feature of utils.storage?.events?.features ?? []) {
                                const getSpotters = feature.properties?.imported?.spotters ?? [];
                                if (getSpotters?.length != 0) {
                                    const getQuery = feature.properties?.imported?.spotters.find(spotter => spotter.name?.toLowerCase().includes(String(getSearch)?.toLowerCase()));
                                    const getSelectedSpotter = getQuery ?? feature.properties?.imported?.spotters[0];
                                    if (getSelectedSpotter.metadata.distance < getMin && getSelectedSpotter.metadata.distance <= getMax) {
                                        getMin = getSelectedSpotter.metadata.distance;
                                        getUnit = getSelectedSpotter.metadata.unit;
                                        getEvent = feature.properties.event;
                                    }
                                }
                            }
                            if (!getEvent) { 
                                return utils.setString(settings.setElement, settings?.global?.setTextPlaceholder ?? `No Events Found`, settings);
                            }
                            return utils.setString(settings.setElement, `${getEvent}: ${getMin.toFixed(1)} ${getUnit}`, settings);
                        }
                        case `getDbzIntensity`: {
                            let key = null;
                            const getSearch = get(aSearch, `setSearch`) ?? null;
                            const getQuery = utils.storage?.tracking?.features.find(tracker => tracker.properties?.name?.toLowerCase().includes(String(getSearch)?.toLowerCase()));
                            const getTracker = getQuery ?? utils.storage?.tracking?.features[0];
                            const getChart = utils.storage?.configurations?.dbz_settings ?? {};
                            if (getTracker && getTracker.properties?.icao) {
                                wise.fetchLatest(getTracker?.properties?.icao, "REF0").then(async getScan => {
                                    if (!getScan) return;
                                    const getLevels = await wise.getWiseLevels(getScan);
                                    const getNearest = getLevels.reduce((a, b) => utils.getDistance(
                                        {lat: getTracker.geometry.coordinates[1], lon: getTracker.geometry.coordinates[0]}, 
                                        {lat: b.lat, lon: b.lon}
                                    ) < utils.getDistance(
                                        {lat: getTracker.geometry.coordinates[1], lon: getTracker.geometry.coordinates[0]}, 
                                        {lat: a.lat, lon: a.lon}
                                    ) ? b : a);
                                    const getSorted = Object.keys(getChart).map(Number).sort((a, b) => a - b);
                                    key = Math.max(getSorted[0], Math.floor(getNearest.dbz / 5) * 5);
                                    if (!getChart[key]) key = getSorted.filter(k => k <= key).pop();
                                    utils.setString(settings.setElement, `${getChart[key]} (${getNearest.dbz.toFixed(1)}dBZ)`, settings);
                                    return 
                                })
                            } else { 
                                return utils.setString(settings.setElement, settings?.global?.setTextPlaceholder ?? `No Data Available`, settings);
                            }
                            break
                        }
                        default: {
                            utils.setString(settings.setElement, settings?.global?.setTextPlaceholder ?? `No Data Available`, settings);
                            break;
                        }
                    }
                }
            }
        })
    </script>
</html>
