<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Metadata -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <title>AtmosphericX - Widgets</title>
        
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/notification.css">
        
        <!-- JS --> 
        <script src="/assets/js/classes/utils.js" defer></script>
        <script src="/assets/js/classes/events.js" defer></script> 
        <script src="/assets/js/classes/widgets.js" defer></script>
        <script src="/assets/js/static/parameters.js" defer></script> 
        <script src="/assets/js/static/subscriptions.js" defer></script>
    </head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        .widget-container { 
            display: none; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 15px;
            color: white; max-width: 900px;
            margin: 50px auto 0 auto; overflow: hidden; 
            box-shadow: 0 5px 12px rgb(0, 0, 0); position: relative;
            padding: 0px; width: 100vw;
        }
        .widget-child-header { 
            background: rgba(0, 0, 0, 0.86); text-align: left;
            font-size: 1.9em; font-weight: bold; 
            padding: 16px;
        }
        .widget-row-1 { 
            background: #000000; display: flex; 
            align-items: center; justify-content: space-between; 
            width: 100%; padding: 8px 16px;
            box-sizing: border-box; 
        }
        .widget-row-2 { 
            background: #000000; display: flex; 
            align-items: center; justify-content: space-between; 
            width: 100%; padding: 8px 16px;
            box-sizing: border-box; 
        }
        .widget-row-3, .widget-row-4 {
            display: flex; align-items: center;
            gap: 6px;
        }
    </style>
    <body>
        <div class="notifications"></div>
        <div class="widget-container" id="widget-container">
            <div class="widget-child-header"></div>
            <div class="widget-child-body"></div>
        </div>
    </body>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let cache = {};
            const settings = {global: aGlobalElementSettings};
            const utils = new Utils();
            const widgets = new Widgets(utils);
            const handler = new Events(utils, widgets);

            settings.setElement = document.getElementById('widget-container')
            settings.setPauseTime = get(aSearch, `setPauseTime`) ?? 8;
            settings.setMaxHistory = get(aSearch, `setMaxHistory`) ?? 5;
            settings.setStreaming = get(aSearch, `setStreaming`) ?? true;
            settings.setPlayback = get(aSearch, `setPlayback`) ?? true;
            settings.setSfx = get(aSearch, `setSfx`) ?? null;
            settings.setSfxVolume = get(aSearch, `setSfxVolume`) ?? 0.5;
            settings.setWx = get(aSearch, `setWx`) ?? true;
            settings.setPulsePoint = get(aSearch, `setPulsePoint`) ?? false;
            settings.global.setAnimationStartDuration = get(aSearch, `setAnimationStartDuration`) ?? 1.0;
            settings.global.setAnimationEndDuration = get(aSearch, `setAnimationEndDuration`) ?? 0.5;
            settings.global.setValuePath = get(aSearch, `setValuePath`) ?? `%properties.event% (%properties.agency ?? properties.action_type%)`;
            settings.global.setElementThemed = false;

            utils.getMobileDevice()
            utils.socket([SUB.CONFIGURATIONS, ...iEventSubscriptions()]).then(() => {
                document.addEventListener('onUpdate', async (event) => {
                    try {
                        widgets.applyGlobalSettings(settings.setElement, settings);  
                        await handler.hSyncEvents(settings);
                        await handler.hSyncQueue(settings);
                    } catch (error) {
                        utils.exception(error, `widgets:alerts`);
                    }
                })
            })
        })
    </script>
</html>
