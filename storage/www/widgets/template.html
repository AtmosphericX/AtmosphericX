<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Metadata -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <title>AtmosphericX - Widgets</title>
        
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/notification.css">
        
        <!-- JS --> 
        <script src="/assets/js/classes/utils.js" defer></script>
        <script src="/assets/js/classes/events.js" defer></script> 
        <script src="/assets/js/classes/widgets.js" defer></script>
        <script src="/assets/js/static/parameters.js" defer></script> 
        <script src="/assets/js/static/subscriptions.js" defer></script>
    </head>
    <style>
        body { overflow: hidden; }
        .widget {
            display: block; width: 100%;
            max-width: 100%; color: var(--clr-light-a0);
            font-size: 50px; text-shadow: 0 0 8px var(--clr-dark-a0);
            height: auto; overflow-wrap: normal;
            text-align: center; word-break: normal;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
    <body>
        <div class="notifications"></div>
        <div class="widget-container" id="widget-container">
            <span class="widget" id="widget"></span>
        </div>
    </body>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let cache = {};
            const settings = {global: aGlobalElementSettings};
            const utils = new Utils();
            const widgets = new Widgets(utils);
            settings.setElement = document.getElementById('widget')
            utils.getMobileDevice()
            utils.socket([SUB.CONFIGURATIONS]).then(() => {
                document.addEventListener('onUpdate', async (event) => {})
            })
        })
    </script>
</html>
