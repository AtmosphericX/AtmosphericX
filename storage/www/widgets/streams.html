<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AtmosphericX - Widgets</title>
        <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon"/>
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/styles/global.css">
        <link rel="stylesheet" href="/assets/styles/notification.css">
        <!-- JS --> 
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
        <script src="/assets/js/classes/utils.js"></script> <!-- Utility Functions -->
        <script src="/assets/js/classes/wise.js"></script> <!-- WeatherWise Logic -->
        <script src="/assets/js/classes/widgets.js"></script> <!-- Widgets Logic -->
        <script src="/assets/js/static/widgetFetch.js"></script> <!-- URL WidgetFetch Logic -->

        <!-- Apple Stuff-->
        <link rel="manifest" href="/assets/static/manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/manifest.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="yes">
    </head>
    <style>
        :root {
            --widget-offset: 2.5rem;
            --widget-z: 100;
            --widget-font-size: 1.9rem;
            --widget-font-weight: 600;
            --widget-text-color: #ffffff;
            --widget-bg: rgba(34, 40, 49, 0.92);
            --widget-radius: 18px;
            --widget-padding: 1.2rem 2rem;
            --widget-blur: blur(8px);  
            --widget-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
            --video-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }
        html,
        body {
            height: 100%;
            margin: 0;
        }
        body {
            overflow: hidden;
            min-height: 100vh;
            background: black;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .widget-container {
            position: fixed;
            inset: 0;
            display: flex;
            padding: var(--widget-offset);
            pointer-events: none;
            align-items: flex-start;
            justify-content: flex-start;
        }
        .widget-child-1 {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            box-shadow: var(--video-shadow);
            transition: opacity 0.7s ease;
        }
        .widget-child-2 {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: var(--widget-font-size);
            font-weight: var(--widget-font-weight);
            color: var(--widget-text-color);
            background: var(--widget-bg);
            border-radius: var(--widget-radius);
            padding: var(--widget-padding);
            backdrop-filter: var(--widget-blur);
            -webkit-backdrop-filter: var(--widget-blur);
            border: none;
            z-index: var(--widget-z);
        }
        .widget-child-3 { 
            position: fixed;
            top: 90%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.422);
            font-size: 45px;
            z-index: 9999;
            pointer-events: none;
        }

    </style>
    <body> 
        <div class="notifications"></div>
        <div class="widget-container" id="widget-container">
            <video class="widget-child-1" id="widget-child-1" autoplay></video>
            <p class="widget-child-3" id="widget-child-3">NOT FOR BROADCAST - REQUIRES PERMISSION FROM OWNER</p>
            <div class="widget-child-2" id="widget-child-2">...</div>
        </div>
    </body>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let cache = {
                running: false,
                previous: null
            };
            const settings = {global: aGlobalElementSettings};
            const utils = new Utils();
            const wise = new Wise(utils);
            const widgets = new Widgets(utils);
            
            settings.setElement = get(aSearch, `setSelectedElement`) ?? document.getElementById('widget-container')
            settings.setElementVideo = get(aSearch, `setElementVideo`) ??  document.getElementById('widget-child-1');
            settings.setElementTitle = get(aSearch, `setElementTitle`) ??  document.getElementById('widget-child-2');
            settings.setRefreshTime = get(aSearch, `setRefreshTime`) ?? 30;
            settings.setTextComponenets = get(aSearch, `setTextComponenets`) ?? true;
            settings.setStreamSource = get(aSearch, `setStreamSource`) ?? `*`;
            settings.setSearch = get(aSearch, `setSearch`) ?? null;
            settings.setLatitude = get(aSearch, `setLatitude`) ?? null;
            settings.setLongitude = get(aSearch, `setLongitude`) ?? null;
            settings.setRadius = get(aSearch, `setRadius`) ?? 125;
            settings.global.setTextPlaceholder = get(aSearch, `setTextPlaceholder`) ?? `No streams available`;
            settings.global.setRoute = get(aSearch, `setRoute`) ??  `%properties.name% (%properties.location ?? properties.source%)`
            settings.global.setElementThemed = false;
            

            if (!settings.setTextComponenets) { 
                settings.setElementTitle.style.display = `none`;
            }
           
            utils.socket([`configurations`, `streams`]).then(() => {
                document.addEventListener('onUpdate', (event) => {
                    widgets.applyGlobalSettings(settings.setElementTitle, settings);  
                    cb()
                })
            })

            function cb() { 
                if (cache.running) { return }
                getActiveStreams = () => {
                    const getPlaceholder = settings.global.setTextPlaceholder;
                    const getStreams = utils?.storage?.streams?.features ?? [];
                    let getFilteredStreams = getStreams.filter(stream => {
                        if (settings.setStreamSource !== `*` && stream.properties.source?.toLowerCase() !== settings.setStreamSource.toLowerCase()) {
                            return false
                        }
                        return true
                    })
                    if (settings.setLatitude && settings.setLongitude) {
                        getFilteredStreams = getFilteredStreams.filter(stream => {
                            const [lon, lat] = stream.geometry.coordinates;
                            const dist = utils.getDistance(
                                { lat: parseFloat(settings.setLatitude), lon: parseFloat(settings.setLongitude) },
                                { lat, lon }
                            );
                            if (dist <= settings.setRadius) {
                                return true;
                            }
                            return false;
                        })
                    }
                    if (settings.setSearch) {
                        getFilteredStreams = getFilteredStreams.filter(stream => {
                            const getStreamName = stream.properties.name?.toLowerCase() ?? ``;
                            const getLocationName = stream.properties.location?.toLowerCase() ?? ``;
                            const setSearch = String(settings.setSearch).toLowerCase();
                            return getStreamName.includes(setSearch) || getLocationName.includes(setSearch);
                        })
                    }
                    if (getFilteredStreams.length === 0) {
                        settings.setElementTitle.textContent = getPlaceholder;
                        return 
                    } 
                    const getRandomStream = getFilteredStreams[Math.floor(Math.random() * getFilteredStreams.length)] ?? null;
                    const getOutput = utils.getTextFromDirectory(getRandomStream, settings.global.setRoute);
                    utils.setString(settings.setElementTitle, getOutput, settings);
                    if (cache.previous == getRandomStream.properties.stream_url) {
                        return;
                    }

                    settings.setElementVideo.style.transition = "opacity 1.0s";
                    settings.setElementVideo.style.opacity = "0";

                    
                    setTimeout(() => {
                        const HLS = new Hls();
                        HLS.loadSource(getRandomStream.properties.stream_url);
                        cache.previous = getRandomStream.properties.stream_url;
                        HLS.on(Hls.Events.MANIFEST_PARSED, () => {
                            HLS.attachMedia(settings.setElementVideo)
                            settings.setElementVideo.play(); 
                            settings.setElementVideo.style.transition = "opacity 3.0s";
                            settings.setElementVideo.style.opacity = "1";
                        })
                    }, 1000)
                }
                getActiveStreams()
                cache.running = setInterval(() => { getActiveStreams() }, settings.setRefreshTime * 1000)
            }
        })
    </script>
</html>
